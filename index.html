
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Rounds Random BG + Colors</title>
<style>
body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial}
.slide{width:1800px;height:1000px;position:relative;border:1px solid #ccc;overflow:hidden}
.dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);transition:all 1.8s ease-in-out}
button{margin:10px;padding:10px 20px;font-size:16px}
</style>
</head>
<body>

<div class="slide" id="slide"></div>
<div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
</div>

<script>
const slide=document.getElementById("slide");
const cx=900, cy=500;

let timer=null, running=false, i=0;

const baseNums=[1,2,3,4,5,7];

const dots=[];
for(let k=0;k<7;k++){
 let d=document.createElement("div");
 d.className="dot";
 slide.appendChild(d);
 dots.push(d);
}

function shuffle(arr){
 const a=[...arr];
 for(let i=a.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
 return a;
}

function randomColor(){
 const palette=["#000","#2E75B6","#C00000","#6AA84F","#7F60A8","#E69138"];
 return palette[Math.floor(Math.random()*palette.length)];
}

function randomBackground(){
 const colors=["#ffffff","#f2f2f2","#e8f0fe","#fff3cd","#e6ffe6","#fce4ec","#e0f7fa"];
 slide.style.background=colors[Math.floor(Math.random()*colors.length)];
}

function randStart(n){
 let arr=[];
 let attempts=0;
 while(arr.length<n && attempts<5000){
  attempts++;
  let x=160+Math.random()*1480;
  let y=160+Math.random()*680;
  let ok=true;
  for(let p of arr){
   let dx=p.x-x, dy=p.y-y;
   if(Math.sqrt(dx*dx+dy*dy)<90) ok=false;
  }
  if(ok) arr.push({x,y,size:30,color:randomColor()});
 }
 while(arr.length<7) arr.push({x:900,y:500,size:0,color:"#000"});
 return arr;
}

function line(n,size){
 let pts=[];
 let spacing=size*0.7;
 let total=n*size+(n-1)*spacing;
 let x=(1800-total)/2+size/2;
 for(let j=0;j<n;j++){
  pts.push({x,y:cy,size,color:randomColor()});
  x+=size+spacing;
 }
 while(pts.length<7) pts.push({x:900,y:500,size:0,color:"#000"});
 return pts;
}

function apply(p){
 p.forEach((d,k)=>{
  dots[k].style.left=d.x+"px";
  dots[k].style.top=d.y+"px";
  dots[k].style.width=d.size+"px";
  dots[k].style.height=d.size+"px";
  dots[k].style.background=d.color;
 });
}

// fully randomized sequence
const pairs=[];
for(let r=0;r<4;r++){
 for(const n of baseNums){
  pairs.push({round:r, quantity:n});
 }
}

const shuffledPairs=shuffle(pairs);

let seq=[];
for(const item of shuffledPairs){
 const n=item.quantity;
 const r=item.round;
 const size = (r===0)?40:(r===1)?80:(r===2)?100:100;

 seq.push(randStart(n));
 seq.push(line(n,size));
}

function loop(){
 if(!running)return;
 randomBackground();
 apply(seq[i]);
 i=(i+1)%seq.length;
 timer=setTimeout(loop,2600);
}

function start(){if(running)return;running=true;loop();}
function pause(){running=false;clearTimeout(timer);}
</script>

</body>
</html>
